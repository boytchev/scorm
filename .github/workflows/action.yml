name: Check Markdown Links

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --timeout 30
            --max-retries 4
            --exclude "soundcloud.com/serpentsoundstudios|deviantart.com|helpx.adobe.com|roa-music.com|fmi.uni-sofia.bg|uni-sofia.bg"
            "**/*.md"
          # Set to false if you don't want the workflow to fail on broken links
          fail: false